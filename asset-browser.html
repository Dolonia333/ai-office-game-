<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Asset Browser (LimeZu)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        background: #020617;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        padding: 12px 14px;
        border-bottom: 1px solid #1f2937;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      header .title {
        font-weight: 700;
        margin-right: 10px;
      }
      label { font-size: 12px; color: #cbd5e1; }
      select, input, button {
        background: #0b1220;
        color: #e5e7eb;
        border: 1px solid #1f2937;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 13px;
      }
      button { cursor: pointer; }
      main {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 0;
        height: calc(100vh - 58px);
      }
      #gridWrap {
        overflow: auto;
        padding: 12px;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
      }
      .tile {
        border: 1px solid #1f2937;
        border-radius: 10px;
        background: #0b1220;
        padding: 8px;
        cursor: pointer;
      }
      .tile:hover { border-color: #334155; }
      canvas.thumb {
        width: 96px;
        height: 96px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
        margin: 0 auto 6px auto;
        background: #020617;
        border-radius: 6px;
      }
      .meta {
        font-size: 12px;
        color: #cbd5e1;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      aside {
        border-left: 1px solid #1f2937;
        padding: 12px;
        overflow: auto;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #0b1220;
        border: 1px solid #1f2937;
        padding: 10px;
        border-radius: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #e5e7eb;
      }
      .hint { font-size: 12px; color: #94a3b8; line-height: 1.35; }
      .ok { color: #86efac; }
      .warn { color: #fecaca; }
    </style>
    <script src="./asset-browser.js" defer></script>
  </head>
  <body>
    <header>
      <div class="title">Asset Browser</div>
      <div>
        <label for="sheet">Sheet</label><br />
        <select id="sheet">
          <option value="basement">XP 14_Basement</option>
          <option value="bedroom">XP 4_Bedroom</option>
          <option value="bathroom">XP 3_Bathroom</option>
          <option value="mo_black_32">Modern Office Black Shadow (32x32)</option>
          <option value="mo_black_48">Modern Office Black Shadow (48x48)</option>
          <option value="master">Master Catalog</option>
        </select>
      </div>
      <div>
        <label for="q">Search (name)</label><br />
        <input id="q" placeholder="obj_12 ..." />
      </div>
      <div>
        <label for="minW">Min W</label><br />
        <input id="minW" type="number" min="0" value="0" style="width:88px" />
      </div>
      <div>
        <label for="minH">Min H</label><br />
        <input id="minH" type="number" min="0" value="0" style="width:88px" />
      </div>
      <div>
        <label for="pageSize">Page size</label><br />
        <select id="pageSize">
          <option value="60">60</option>
          <option value="120">120</option>
          <option value="240">240</option>
        </select>
      </div>
      <div>
        <label>&nbsp;</label><br />
        <button id="prev">Prev</button>
        <button id="next">Next</button>
      </div>
      <div class="hint">
        Click a thumbnail to copy a JSON snippet for <code>furniture_catalog.json</code>.
      </div>
    </header>
    <main>
      <div id="gridWrap">
        <div id="status" class="hint"></div>
        <div id="grid"></div>
      </div>
      <aside>
        <div class="hint">
          <div><b>Selected</b>: <span id="selName">none</span></div>
          <div><b>Sheet key</b>: <span id="selSheetKey">-</span></div>
        </div>
        <h3 style="margin:10px 0 6px 0; font-size:14px;">Copy snippet</h3>
        <pre id="snippet">{}</pre>
        <button id="copy" style="margin-top:8px;">Copy to clipboard</button>
        <div id="copyStatus" class="hint" style="margin-top:8px;"></div>
        <hr style="border:0; border-top:1px solid #1f2937; margin:14px 0;" />
        <div class="hint">
          <div><b>How to use</b></div>
          <div>
            Paste the snippet under <code>objects</code> in
            <code>pixel-office-game/data/furniture_catalog.json</code>, then add a placement with
            an <code>instanceId</code>.
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
